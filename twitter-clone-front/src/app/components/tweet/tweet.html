<mat-card appearance="outlined" class="mt-3">
    <mat-card-header>
        <div mat-card-avatar class="bg-[url('https://material.angular.dev/assets/img/examples/shiba1.jpg')] bg-cover">
        </div>
        <mat-card-title>{{ author()?.displayUsername }}</mat-card-title>
        <mat-card-subtitle>{{ author()?.username }}</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content class="text-xl">{{ post.textContent }}</mat-card-content>
    <mat-card-actions class="flex justify-around">
        <button class="flex items-center gap-1" (click)="onLike()">
            <mat-icon>{{ isLiked() ? 'favorite' : 'favorite_border' }}</mat-icon>
            <span>{{ likes() }}</span>
        </button>

        <button class="flex items-center gap-1">
            <mat-icon>comment</mat-icon>
            <span>{{replies()}}</span>
        </button>

        <button class="flex items-center gap-1">
            <mat-icon>share</mat-icon>
            <span>0</span>
        </button>

        <button class="flex items-center">
            <mat-icon>bookmark</mat-icon>
        </button>
    </mat-card-actions>
</mat-card>
