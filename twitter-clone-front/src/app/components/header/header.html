<mat-toolbar class="flex justify-center items-center gap-12">
    <img class="block size-12 object-contain" src="logo.ico" alt="TwitterClone">
    <app-search-bar class="flex items-center"></app-search-bar>
    @if (isRegistered()){
    <div class="flex flex-row">
        <div class="flex flex-col">
            @if (userInfo(); as user) {
            <p>{{ user.displayUsername }}</p>
            <p class="text-sm">@{{ user.username }}</p>
            } @else {
            <p class="text-sm">Loading...</p>
            }
        </div>
        <button class="ml-2" matTooltip="Logout" (click)="onLogout()">
            <mat-icon>logout</mat-icon>
        </button>
    </div>
    } @else {
    <button matButton="filled" routerLink="/login">Login</button>
    }
</mat-toolbar>
