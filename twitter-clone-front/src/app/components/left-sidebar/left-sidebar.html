<mat-drawer-container class="h-screen">

  <!-- SIDEBAR -->
  <mat-drawer mode="side" opened class="w-64 bg-gray-900 text-white p-4 flex flex-col gap-2">

    <button class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-800 transition">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </button>

    <button class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-800 transition">
      <mat-icon>person</mat-icon>
      <span>Profile</span>
    </button>

    <button class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-800 transition">
      <mat-icon>mail</mat-icon>
      <span>Messages</span>
    </button>

    <button class="flex items-center gap-3 p-2 rounded-lg hover:bg-gray-800 transition">
      <mat-icon>settings</mat-icon>
      <span>Settings</span>
    </button>

  </mat-drawer>

  <!-- CONTENT -->
  <mat-drawer-content class="p-6">
    <p>Main content here</p>
  </mat-drawer-content>

</mat-drawer-container>
