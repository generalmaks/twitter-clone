<mat-form-field appearance="outline" class="w-96 search-field">
    <mat-label>Search</mat-label>

    <input matInput type="text" [(ngModel)]="searchText" placeholder="Search posts..." />

    @if (searchText() != '') {
    <button mat-icon-button matSuffix type="button" aria-label="Clear search" (click)="clearSearch()">
        <mat-icon>close</mat-icon>
    </button>
    }

    <mat-icon matPrefix>search</mat-icon>
</mat-form-field>
